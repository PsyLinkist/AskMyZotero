<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AskMyZotero</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --el-color-primary: #2563eb; 
  --el-color-primary-hover: #1d4ed8;
  --el-color-primary-light: #eff6ff;
  --el-text-primary: #111827;
  --el-text-regular: #374151;
  --el-text-secondary: #6b7280;
  --el-text-placeholder: #9ca3af;
  --el-border-color: #e5e7eb;
  --el-border-color-light: #f3f4f6;
  --el-bg-color-page: #ffffff;
  --el-bg-color-sidebar: #fafafa;
  --font-family: 'Inter', 'Noto Sans SC', 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: var(--font-family);
  background-color: var(--el-bg-color-page);
  color: var(--el-text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.app-header {
  height: 56px;
  background-color: var(--el-bg-color-page);
  border-bottom: 1px solid var(--el-border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  flex-shrink: 0;
  z-index: 10;
}
.header-title {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-title-sub {
  font-size: 12px;
  color: var(--el-text-secondary);
  font-weight: 400;
  margin-top: 2px;
}
.el-button {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  height: 32px;
  white-space: nowrap;
  cursor: pointer;
  background-color: transparent;
  border: 1px solid var(--el-border-color);
  color: var(--el-text-regular);
  border-radius: 6px;
  padding: 0 16px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-family);
  transition: all 0.2s;
}
.el-button:hover {
  color: var(--el-color-primary);
  border-color: var(--el-color-primary);
  background-color: var(--el-color-primary-light);
}

.notice-box {
  background-color: #fef0f0;
  color: #f56c6c;
  padding: 10px 24px;
  font-size: 13px;
  text-align: center;
  border-bottom: 1px solid #fde2e2;
  display: none;
}
.notice-box a { color: #f56c6c; font-weight: bold; text-decoration: underline; }

/* Main Layout */
.app-main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.filters-sidebar {
  width: 300px;
  background-color: var(--el-bg-color-sidebar);
  border-right: 1px solid var(--el-border-color);
  padding: 24px;
  overflow-y: auto;
  flex-shrink: 0;
}

.filters-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--el-text-secondary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.filter-group {
  margin-bottom: 20px;
}

.filter-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--el-text-primary);
  margin-bottom: 8px;
}

.filter-control,
.filter-range input {
  width: 100%;
  border: 1px solid var(--el-border-color);
  border-radius: 8px;
  min-height: 40px;
  padding: 0 12px;
  font-size: 14px;
  color: var(--el-text-primary);
  background-color: var(--el-bg-color-page);
  font-family: var(--font-family);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.filter-control:focus,
.filter-range input:focus {
  outline: none;
  border-color: var(--el-color-primary);
  box-shadow: 0 0 0 2px var(--el-color-primary-light);
}

.filter-control:disabled {
  color: var(--el-text-placeholder);
  background-color: #f9fafb;
  cursor: not-allowed;
}

.filter-range {
  display: flex;
  gap: 8px;
}

.filter-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 8px;
}

.filter-clear-btn {
  width: 100%;
  height: 40px;
  border-radius: 8px;
}

.inline-syntax {
  border-top: 1px solid var(--el-border-color);
  padding-top: 18px;
  margin-top: 24px;
}

.inline-syntax-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--el-text-secondary);
  margin-bottom: 10px;
}

.syntax-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.syntax-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 6px;
  background-color: #f3f4f6;
  color: var(--el-text-secondary);
  font-size: 13px;
}

/* Chat Area */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  background-color: var(--el-bg-color-page);
  position: relative;
  min-height: 0;
}

.chat-history {
  flex: 1;
  overflow-y: auto;
  padding: 40px 15%;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.message-row {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.message-row.user {
  align-items: flex-end;
}

.message-row.ai {
  align-items: flex-start;
}

.message {
  max-width: 85%;
  font-size: 15px;
  line-height: 1.6;
}

.message.user {
  background-color: var(--el-color-primary);
  color: white;
  padding: 12px 20px;
  border-radius: 16px;
  border-bottom-right-radius: 4px;
  font-weight: 400;
}

.message.ai {
  background-color: var(--el-bg-color-page);
  border: 1px solid var(--el-border-color);
  padding: 24px;
  border-radius: 16px;
  border-top-left-radius: 4px;
  color: var(--el-text-primary);
  width: 100%;
}

.message.ai p {
  margin-top: 0;
  margin-bottom: 16px;
}
.message.ai p:last-child {
  margin-bottom: 0;
}

.ref-tag {
  color: var(--el-color-primary);
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  padding: 0 2px;
}
.ref-tag:hover {
  text-decoration: underline;
}
.ref-tag.is-jumpable {
  border-radius: 4px;
  transition: background-color 0.2s ease;
}
.ref-tag.is-jumpable:hover {
  background-color: var(--el-color-primary-light);
}

/* Input Area */
.input-area {
  padding: 0 15% 40px 15%;
  background-color: var(--el-bg-color-page);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input-main {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  width: 100%;
}

.input-box-container {
  flex: 1;
  background: var(--el-bg-color-page);
  border: 1px solid var(--el-border-color);
  border-radius: 8px;
  padding: 10px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: flex;
}
.input-box-container:focus-within {
  border-color: var(--el-color-primary);
  box-shadow: 0 0 0 2px var(--el-color-primary-light);
}

.input-box-container textarea {
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  font-family: inherit;
  font-size: 15px;
  line-height: 1.5;
  min-height: 22px;
  max-height: 150px;
  color: var(--el-text-primary);
  background: transparent;
  padding: 0;
}
.input-box-container textarea::placeholder {
  color: var(--el-text-placeholder);
}

.send-btn {
  background-color: var(--el-color-primary);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 0 24px;
  height: 44px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-family);
  flex-shrink: 0;
}
.send-btn:hover { background-color: var(--el-color-primary-hover); }
.send-btn:disabled { background-color: var(--el-text-placeholder); cursor: not-allowed; }

/* 快捷问答按钮 */
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.quick-btn {
  background-color: var(--el-bg-color-sidebar);
  border: 1px solid var(--el-border-color);
  color: var(--el-text-regular);
  border-radius: 16px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-family);
}

.quick-btn:hover {
  color: var(--el-color-primary);
  border-color: var(--el-color-primary-light);
  background-color: var(--el-color-primary-light);
}


/* Right Sidebar (Sources) */
.sidebar {
  width: 380px;
  background-color: var(--el-bg-color-sidebar);
  border-left: 1px solid var(--el-border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  min-height: 0;
}
.sidebar-header {
  padding: 24px 24px 12px 24px;
  font-size: 13px;
  font-weight: 600;
  color: var(--el-text-secondary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.sources-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 0;
}
.source-card {
  border: 1px solid var(--el-border-color);
  border-radius: 12px;
  padding: 16px;
  background-color: var(--el-bg-color-page);
  scroll-margin-top: 16px;
  transition: box-shadow 0.25s ease, border-color 0.25s ease, background-color 0.25s ease;
  display: flex;
  flex-direction: column;
  /* 强制换行：防止任何过长内容撑破卡片 */
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
}
.source-card-index {
  color: var(--el-color-primary);
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}
.source-card.source-card--active {
  border-color: var(--el-color-primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
  background-color: #f8fbff;
}
.source-card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--el-text-primary);
  margin-bottom: 6px;
  line-height: 1.4;
}
.source-card-meta {
  font-size: 13px;
  color: var(--el-text-secondary);
  margin-bottom: 8px;
  line-height: 1.4;
}
.source-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 4px;
}
.source-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  background-color: var(--el-color-primary-light);
  color: var(--el-color-primary);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
}

/* Evidence Summary */
.source-summary {
  font-size: 13px;
  color: var(--el-text-regular);
  margin-top: 12px;
  line-height: 1.5;
  border-top: 1px dashed var(--el-border-color);
  padding-top: 12px;
}
.source-summary-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--el-text-secondary);
  margin-bottom: 6px;
}
.snippet-item {
  margin-bottom: 8px;
  /* 强制换行：专门针对摘要中过长的连贯英文字母 */
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
}
.snippet-item:last-child {
  margin-bottom: 0;
}

.loading-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background-color: var(--el-color-primary);
  margin: 0 2px;
  animation: wave 1.3s linear infinite;
}
.loading-dot:nth-child(2) { animation-delay: -1.1s; }
.loading-dot:nth-child(3) { animation-delay: -0.9s; }
@keyframes wave {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

.ai-content strong { font-weight: 600; color: var(--el-text-primary); }
.ai-content ul { margin: 10px 0; padding-left: 20px; }
.ai-content li { margin-bottom: 6px; }

.empty-sources {
  color: var(--el-text-placeholder);
  font-size: 13px;
  text-align: left;
  margin-top: 10px;
}

/* Zotero 打开按钮样式 */
.zotero-link-btn {
  display: inline-flex;
  align-items: center;
  margin-top: 12px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--el-color-primary);
  background-color: var(--el-color-primary-light);
  border: 1px solid var(--el-color-primary);
  border-radius: 6px;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  width: fit-content;
}
.zotero-link-btn:hover {
  background-color: var(--el-color-primary);
  color: white;
}

/* Element Plus 风格 Tag 容器与样式 */
.source-tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.el-tag {
  display: inline-flex;
  align-items: center;
  padding: 0 8px;
  height: 24px;
  font-size: 12px;
  line-height: 1;
  border-radius: 4px;
  white-space: nowrap;
  background-color: #ecf5ff; /* Element 主题淡蓝 */
  border: 1px solid #d9ecff;
  color: #409eff;
}
.el-tag--success {
  background-color: #f0f9eb; /* Element 主题淡绿 */
  border: 1px solid #e1f3d8;
  color: #67c23a;
}
/* 期刊标签的橙色主题 */
.el-tag--warning {
  background-color: #fdf6ec; 
  border: 1px solid #faecd8;
  color: #e6a23c;
}

/* 专门用于文本超长截断的类 */
.tag-truncate {
  max-width: 130px; /* 你可以根据需要调大或调小这个宽度 */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  display: inline-block;
  vertical-align: bottom;
}
@media (max-width: 1180px) {
  .filters-sidebar,
  .sidebar {
    display: none;
  }

  .chat-history,
  .input-area {
    padding-left: 8%;
    padding-right: 8%;
  }
}
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="header-title">AskMyZotero</div>
    <div class="header-title-sub">基于大语言模型与本地文献库的智能问答</div>
  </div>
  <button class="el-button" onclick="window.location.href='settings.html?returnTo=main'">
    <svg style="width:14px;height:14px;margin-right:6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    设置
  </button>
</div>

<div class="notice-box" id="configNotice"></div>

<div class="app-main">
  <aside class="filters-sidebar">
    <div class="filters-title">Filters</div>

    <div class="filter-group">
      <label class="filter-label">Date range</label>
      <div class="filter-range">
        <input id="yearFromFilter" type="number" inputmode="numeric" placeholder="From (YYYY)">
        <input id="yearToFilter" type="number" inputmode="numeric" placeholder="To (YYYY)">
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="authorFilter">Author</label>
      <input id="authorFilter" class="filter-control" type="text" placeholder="e.g. Volcker">
    </div>

    <div class="filter-group">
      <label class="filter-label" for="tagFilter">Tag</label>
      <input id="tagFilter" class="filter-control" type="text" placeholder="e.g. monetary-policy">
    </div>

    <div class="filter-group">
      <label class="filter-label" for="collectionFilter">Collection</label>
      <input id="collectionFilter" class="filter-control" type="text" placeholder="e.g. DTRP">
    </div>

    <div class="filter-group">
      <label class="filter-label" for="resultsFilter">Results</label>
      <select id="resultsFilter" class="filter-control">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="30">30</option>
      </select>
    </div>

    <div class="filter-actions">
      <button class="el-button filter-clear-btn" type="button" onclick="clearAllFilters()">Clear all filters</button>
    </div>

    <div class="inline-syntax">
      <div class="inline-syntax-title">Inline syntax</div>
      <div class="syntax-chip-row">
        <span class="syntax-chip">type:hearing</span>
        <span class="syntax-chip">by:Volcker</span>
        <span class="syntax-chip">in:DTRP</span>
        <span class="syntax-chip">tag:mmf</span>
      </div>
    </div>
  </aside>

  <div class="chat-container">
    <div class="chat-history" id="chatArea">
      <div class="message-row ai">
        <div class="message ai">
          <div class="ai-content">
            <p>你好！我是你的 Zotero 文献助手。</p>
      <p>你可以用自然语言搜索你读过的文献，或者直接向我提问，我会基于你的文献库为你提供解答，并在右侧展示相关的引用文献。</p>
          </div>
        </div>
      </div>
    </div>
    
    <div class="input-area">
      <div class="input-main">
        <div class="input-box-container">
          <textarea id="queryInput" placeholder="Ask about your sources..." rows="1"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="runSearch()">Send</button>
      </div>
      
      <div class="quick-actions">
        <button class="quick-btn" onclick="fillQuery('哪些文章使用了检索方法？')">检索方法</button>
        <button class="quick-btn" onclick="fillQuery('我读过哪些关于RAG的文献？其中有哪些是顶会的？')">RAG顶会</button>
        <button class="quick-btn" onclick="fillQuery('有没有用了投影技术的文献？')">投影技术</button>
        <button class="quick-btn" onclick="fillQuery('2023年以后的多模态相关文献')">多模态</button>
        <button class="quick-btn" onclick="fillQuery('有哪些文献研究了大语言模型的幻觉问题？')">幻觉问题</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">SOURCES</div>
    <div class="sources-list" id="sourcesArea">
      <div class="empty-sources">检索后将在此处显示引用文献</div>
    </div>
  </div>
</div>

<script>
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const yearFromFilter = document.getElementById('yearFromFilter');
const yearToFilter = document.getElementById('yearToFilter');
const authorFilter = document.getElementById('authorFilter');
const tagFilter = document.getElementById('tagFilter');
const collectionFilter = document.getElementById('collectionFilter');
const resultsFilter = document.getElementById('resultsFilter');

// —————————— 打字机速度配置（直接改这里！单位：毫秒）——————————
const TYPE_SPEED = 5; // 越小越快，建议 10~50

function autoResize(el) {
  el.style.height = 'auto';
  let newHeight = el.scrollHeight;
  if(newHeight > 150) newHeight = 150;
  el.style.height = newHeight + 'px';
}
function fillQuery(text) {
  queryInput.value = text;
  autoResize(queryInput);
  queryInput.focus();
}
queryInput.addEventListener('input', function() { autoResize(this); });
queryInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runSearch(); }
});

function splitFilterInput(value) {
  return String(value || '')
    .split(/[,\n，;]+/)
    .map(item => item.trim())
    .filter(Boolean);
}

function collectHardFilters() {
  const filters = {};
  const authors = splitFilterInput(authorFilter.value);
  const tags = splitFilterInput(tagFilter.value);
  const collections = splitFilterInput(collectionFilter.value);
  const yearFrom = yearFromFilter.value.trim();
  const yearTo = yearToFilter.value.trim();

  if (authors.length) filters.authors = authors;
  if (tags.length) filters.tags = tags;
  if (collections.length) filters.collections = collections;
  if (yearFrom || yearTo) {
    filters.date_range = {};
    if (yearFrom) filters.date_range.from = Number(yearFrom);
    if (yearTo) filters.date_range.to = Number(yearTo);
  }
  return filters;
}

function clearAllFilters() {
  yearFromFilter.value = '';
  yearToFilter.value = '';
  authorFilter.value = '';
  tagFilter.value = '';
  collectionFilter.value = '';
  resultsFilter.value = '20';
}

// 格式化文本（加粗、引用、换行）
function formatAnswerText(text) {
  if(!text) return '';
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[(\d+)\]/g, '<span class="ref-tag is-jumpable" data-ref-index="$1">[$1]</span>');
  html = html.split('\\n').join('<br/>').split('\n').join('<br/>');
  return html;
}
let activeSourceCardTimer = null;
function jumpToSource(refIndex) {
  const index = Number(refIndex);
  if (!Number.isInteger(index) || index < 1) return;
  const sourceCard = document.getElementById(`source-card-${index}`);
  if (!sourceCard) return;

  sourceCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (activeSourceCardTimer) clearTimeout(activeSourceCardTimer);
  document.querySelectorAll('.source-card--active').forEach(card => {
    card.classList.remove('source-card--active');
  });
  sourceCard.classList.add('source-card--active');
  activeSourceCardTimer = setTimeout(() => {
    sourceCard.classList.remove('source-card--active');
  }, 1800);
}
function appendUserMessage(text) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message-row user';
  div.innerHTML = `<div class="message user">${escapeHtml(text)}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function appendAIMessageLoading(id) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message-row ai';
  div.id = id;
  div.innerHTML = `
    <div class="message ai">
      <div class="ai-content">
        <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
      </div>
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// —————————— 打字机核心函数 ——————————
async function typeWriter(element, fullText, speed) {
  const contentEl = element.querySelector('.ai-content');
  contentEl.innerHTML = '';
  let formatted = formatAnswerText(fullText);
  // 逐字插入
  for (let i = 0; i < formatted.length; i++) {
    contentEl.innerHTML = formatted.substring(0, i + 1);
    // 自动滚动到底部
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
    await new Promise(resolve => setTimeout(resolve, speed));
  }
}

function renderSources(references, evidenceSummary) {
  const sourcesArea = document.getElementById('sourcesArea');
  if(!references || references.length === 0) {
    sourcesArea.innerHTML = '<div class="empty-sources">未找到相关的引用文献</div>';
    return;
  }
  let html = '';
  references.forEach((ref, idx) => {
    let titleText = escapeHtml(ref.title || '未知文献');

    // 1. 处理作者 Tag：只取第一作者并追加“等”
    let authorTagHtml = '';
    if (ref.authors && ref.authors !== 'Unknown' && ref.authors !== 'unknown') {
      const authorArray = String(ref.authors).split(',');
      const firstAuthor = authorArray[0].trim();
      const displayAuthor = authorArray.length > 1 ? `${firstAuthor} 等` : firstAuthor;
      authorTagHtml = `<span class="el-tag">👤 ${escapeHtml(displayAuthor)}</span>`;
    }
    
    // 2. 处理年份 Tag
    let yearTagHtml = '';
    if (ref.year) {
      yearTagHtml = `<span class="el-tag el-tag--success">📅 ${escapeHtml(ref.year)}</span>`;
    }

    // 3. 处理期刊/会议 Tag (新增)
    let venueTagHtml = '';
    if (ref.venue && ref.venue !== 'N/A' && ref.venue.toLowerCase() !== 'unknown') {
      // 加上 title 属性，鼠标悬浮时展示完整名称；内部套一个 span 用于超出截断
      venueTagHtml = `<span class="el-tag el-tag--warning" title="${escapeHtml(ref.venue)}">
        🏛️ <span class="tag-truncate" style="margin-left: 2px;">${escapeHtml(ref.venue)}</span>
      </span>`;
    }

    // 4. 组合 Tags 容器 (把 venueTagHtml 也加进去)
    let tagsRowHtml = '';
    if (authorTagHtml || yearTagHtml || venueTagHtml) {
      tagsRowHtml = `<div class="source-tags-row">${authorTagHtml}${yearTagHtml}${venueTagHtml}</div>`;
    }
    
    // 5. 调整 Meta 信息（仅保留页码）
    let metaText = '';
    if (ref.page) {
      metaText = escapeHtml(`p. ${ref.page}`);
    }
    
    let summaryHtml = '';
    
    // 【重要清理】：由于期刊信息已经放入了上面的 venueTagHtml，这里要把旧的 badgeHtml 删掉或置空，防止重复显示！
    // 删掉原本的: let badgeHtml = ref.venue ? `<span class="source-badge">${escapeHtml(ref.venue)}</span>` : '';
    let badgeHtml = '';
    
    // --- 修改这里的按钮生成逻辑 ---
    let actionBtnHtml = '<div style="display: flex; flex-direction: column; gap: 8px; margin-top: 12px;">';
    
    // 按钮 1：在 Zotero 中打开
    if (ref.attachment_key) {
      const pageParam = ref.page ? `?page=${ref.page}` : '';
      const zoteroUrl = `zotero://open-pdf/library/items/${ref.attachment_key}${pageParam}`;
      actionBtnHtml += `<a href="${zoteroUrl}" class="zotero-link-btn" style="margin-top: 0;">📖 在 Zotero 中打开 (P${ref.page || 1})</a>`;
    } 
    
    // 按钮 2：调用系统本地打开
    if (ref.source_path) {
      const safePath = ref.source_path.replace(/\\/g, '\\\\'); 
      const pageText = ref.page ? ` (P${ref.page})` : '';
      // 注意：我们在按钮文字上也加上了页码提示，方便你手动翻页
      actionBtnHtml += `<button onclick="openLocalFile('${safePath}')" class="zotero-link-btn" style="margin-top: 0;">📁 本地 PDF 阅读器中打开</button>`;
    }
    
    actionBtnHtml += '</div>';
    // ---------------------------------

    // 注意中间增加了 ${tagsRowHtml} 变量
    html += `
      <div class="source-card" id="source-card-${idx + 1}" data-source-index="${idx + 1}">
        <div class="source-card-index">[${idx + 1}]</div>
        <div class="source-card-title">${titleText}</div>
        ${tagsRowHtml}
        ${metaText ? `<div class="source-card-meta">${metaText}</div>` : ''}
        ${summaryHtml}
        ${actionBtnHtml}
      </div>`;
  });
  sourcesArea.innerHTML = html;
}

document.getElementById('chatArea').addEventListener('click', function(event) {
  const refTag = event.target.closest('.ref-tag[data-ref-index]');
  if (!refTag) return;
  jumpToSource(refTag.dataset.refIndex);
});

// ==============================================
// 【完整恢复】请求后端打开本地文件函数（无删减）
// ==============================================
async function openLocalFile(filePath) {
  try {
    const savedConfig = JSON.parse(localStorage.getItem('zoteroRagConfig') || '{}');
    const apiBaseUrl = (savedConfig.api?.url || 'http://127.0.0.1:8000').replace(/\/+$/, '');
    
    // 完整后端请求逻辑
    const response = await fetch(`${apiBaseUrl}/api/open_local_file`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: filePath })
    });
    
    const data = await response.json();
    if (!data.success) {
      alert("无法打开文件：" + data.error);
    }
  } catch (error) {
    alert("请求后端打开文件失败，请确保后端服务正常运行。");
  }
}

// —————————— 主请求函数（零后端改动！）——————————
async function runSearch() {
  const query = queryInput.value.trim();
  if (!query) return;
  const hardFilters = collectHardFilters();
  const topK = Number(resultsFilter.value || 20);

  appendUserMessage(query);
  const msgId = 'msg-' + Date.now();
  appendAIMessageLoading(msgId);
  const aiMsgEl = document.getElementById(msgId);

  queryInput.value = '';
  queryInput.style.height = 'auto';
  sendBtn.disabled = true;

  try {
    const savedConfig = JSON.parse(localStorage.getItem('zoteroRagConfig') || '{}');
    const apiBaseUrl = (savedConfig.api?.url || 'http://127.0.0.1:8000').replace(/\/+$/, '');
    
    // 【重要】还是用你原来的接口，不用改后端！
    const response = await fetch(`${apiBaseUrl}/api/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, top_k: topK, filters: hardFilters })
    });
    const data = await response.json();

    if (data.success) {
      // —— 右侧 SOURCES 立刻显示 ——
      renderSources(data.references, data.evidence_summary);
      // —— 中间回答 打字机逐字输出 ——
      await typeWriter(aiMsgEl, data.answer || '未能生成回答。', TYPE_SPEED);
    } else {
      aiMsgEl.querySelector('.ai-content').innerHTML = 
        `<span style="color:#f56c6c">搜索失败：${escapeHtml(data.error_message)}</span>`;
    }
  } catch (error) {
    aiMsgEl.querySelector('.ai-content').innerHTML = 
      `<span style="color:#f56c6c">无法连接到后端服务器，请检查设置页中的后端地址，并确保服务已启动</span>`;
  } finally {
    sendBtn.disabled = false;
  }
}

function mergeServerConfigToLocalStorage(data) {
  try {
    const raw = localStorage.getItem('zoteroRagConfig');
    const existing = raw ? JSON.parse(raw) : {};
    const merged = {
      rag: {
        zoteroPath: data.zotero_path || existing.rag?.zoteroPath || '',
        apiKey: '',
        baseUrl: data.base_url ?? existing.rag?.baseUrl ?? '',
        chatModel: data.chat_model || existing.rag?.chatModel || 'gpt-4o-mini',
        embeddingModel: data.embedding_model || existing.rag?.embeddingModel || 'text-embedding-3-small',
      },
      api: { url: existing.api?.url || 'http://127.0.0.1:8000' },
    };
    localStorage.setItem('zoteroRagConfig', JSON.stringify(merged));
  } catch (_) {}
}

async function checkConfigBeforeUse() {
  const notice = document.getElementById('configNotice');
  const apiBaseUrl = 'http://127.0.0.1:8000';
  try {
    const cfgRes = await fetch(`${apiBaseUrl}/api/config`);
    const data = await cfgRes.json();
    if (cfgRes.ok && data.success) mergeServerConfigToLocalStorage(data);
    const missingConfig = !cfgRes.ok || !data.success || !data.zotero_path || !data.api_key_set;
    if (missingConfig) {
      notice.style.display = 'block';
      notice.innerHTML = `首次使用请先完成配置（PDF 文件夹、API Key 等）。<a href="settings.html?returnTo=main">点击前往设置</a>`;
      return;
    }
    let healthRes = await fetch(`${apiBaseUrl}/health`);
    let health = await healthRes.json();
    if (!health.ready) {
      await fetch(`${apiBaseUrl}/api/init`, { method: 'POST' });
      healthRes = await fetch(`${apiBaseUrl}/health`);
      health = await healthRes.json();
    }
    if (!health.ready) {
      notice.style.display = 'block';
      notice.innerHTML = `后端引擎未就绪：${health.init_error || '引擎未能就绪'} <a href="settings.html?returnTo=main">检查设置</a>`;
      return;
    }
    notice.style.display = 'none';
  } catch (error) {
    notice.style.display = 'block';
    notice.innerHTML = `后端未启动，无法查询文献。请先启动服务，再到设置页检查配置。`;
  }
}
checkConfigBeforeUse();
