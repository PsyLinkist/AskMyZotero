<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文献助手 · Zotero RAG</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-background-tertiary: #eeede8;
  --color-background-info: #e6f1fb;
  --color-background-success: #eaf3de;
  --color-background-warning: #faeeda;
  --color-background-danger: #fcebeb;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #5f5e5a;
  --color-text-tertiary: #888780;
  --color-text-info: #0c447c;
  --color-text-success: #27500a;
  --color-text-warning: #633806;
  --color-text-danger: #791f1f;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.35);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
  --font-sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-serif: 'Noto Serif SC', 'SimSun', serif;
  --font-mono: 'SF Mono', 'Consolas', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.page-wrap {
  max-width: 860px;
  margin: 0 auto;
}

.app { padding: 1.5rem 0; }

.header { margin-bottom: 2rem; }
.header-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.header-title {
  font-size: 28px;
  font-weight: 500;
  color: var(--color-text-primary);
}
.header-sub {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-top: 4px;
}

.settings-btn {
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 8px 16px;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: opacity 0.15s;
}

.settings-btn:hover {
  opacity: 0.75;
}

.settings-btn:active {
  opacity: 0.55;
  transform: scale(0.98);
}

.notice-box {
  background: var(--color-background-warning);
  color: var(--color-text-warning);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 10px 12px;
  margin-bottom: 10px;
  font-size: 13px;
  display: none;
}

.search-box {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.search-row { display: flex; gap: 10px; align-items: flex-start; }
.search-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font-sans);
  font-size: 15px;
  color: var(--color-text-primary);
  background: transparent;
  resize: none;
  min-height: 48px;
  line-height: 1.6;
}
.search-input::placeholder { color: var(--color-text-tertiary); }
.search-btn {
  flex-shrink: 0;
  background: var(--color-text-primary);
  color: var(--color-background-primary);
  border: none;
  border-radius: var(--border-radius-md);
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: opacity 0.15s;
  white-space: nowrap;
}
.search-btn:hover { opacity: 0.75; }
.search-btn:active { opacity: 0.55; transform: scale(0.98); }

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--color-border-tertiary);
}
.chip {
  font-size: 12px;
  color: var(--color-text-secondary);
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 20px;
  padding: 4px 12px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.chip:hover {
  background: var(--color-background-tertiary);
  border-color: var(--color-border-secondary);
}

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.results-count { font-size: 13px; color: var(--color-text-secondary); }
.results-count strong { color: var(--color-text-primary); font-weight: 500; }
.sort-select {
  font-size: 12px;
  color: var(--color-text-secondary);
  background: transparent;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 4px 8px;
  font-family: var(--font-sans);
  cursor: pointer;
}

.card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 10px;
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: pointer;
}
.card:hover {
  border-color: var(--color-border-secondary);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
}
.card-index {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  min-width: 20px;
  padding-top: 2px;
}
.card-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
  line-height: 1.4;
  flex: 1;
}
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 8px;
  padding-left: 32px;
}
.meta-sep { color: var(--color-border-secondary); }

.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.badge-conf {
  background: var(--color-background-info);
  color: var(--color-text-info);
}
.badge-journal {
  background: var(--color-background-success);
  color: var(--color-text-success);
}
.badge-preprint {
  background: var(--color-background-warning);
  color: var(--color-text-warning);
}

.card-abstract {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.6;
  padding-left: 32px;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-evidence {
  padding-left: 32px;
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.evidence-item {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.65;
  padding: 10px 12px;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  white-space: pre-wrap;
}
.evidence-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  margin-bottom: 6px;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding-left: 32px;
}
.tag {
  font-size: 11px;
  color: var(--color-text-secondary);
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 4px;
  padding: 2px 7px;
}

.answer-box {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.25rem;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
}
.answer-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--color-text-tertiary);
  margin-bottom: 12px;
  display: block;
}
.answer-content {
  color: var(--color-text-primary);
}
.answer-content ul {
  margin-left: 20px;
  margin-top: 8px;
  margin-bottom: 8px;
}
.answer-content li {
  margin-bottom: 6px;
}
.answer-content strong {
  font-weight: 500;
  color: var(--color-text-primary);
}

.empty {
  text-align: center;
  padding: 3rem 0;
  color: var(--color-text-tertiary);
  font-size: 14px;
}
.empty-icon {
  font-size: 32px;
  margin-bottom: 10px;
}

.loading-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 2rem 0;
}
.loading-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--color-text-tertiary);
  animation: pulse 1.2s infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

/* fade-in animation for results */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeUp 0.25s ease both; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
</style>
</head>
<body>
<div class="page-wrap">
<div class="app">
  <div class="header" style="display: flex; justify-content: space-between; align-items: flex-start;">
    <div>
      <div class="header-label">文献助手 · Zotero RAG</div>
      <div class="header-title">查询我的文献库</div>
      <div class="header-sub">用自然语言搜索你读过的文献</div>
    </div>
    <button class="settings-btn" onclick="window.location.href='settings.html?returnTo=main'">⚙️ 设置</button>
  </div>

  <div class="notice-box" id="configNotice"></div>

  <div class="search-box">
    <div class="search-row">
      <textarea class="search-input" id="queryInput" placeholder="例如：哪些文章使用了检索增强方法？" rows="1"></textarea>
      <button class="search-btn" onclick="runSearch()">搜索 ↗</button>
    </div>
    <div class="chips">
      <span class="chip" onclick="fillQuery('哪些文章使用了检索方法？')">检索方法</span>
      <span class="chip" onclick="fillQuery('我读过哪些关于RAG的文献？其中有哪些是顶会的？')">RAG 顶会</span>
      <span class="chip" onclick="fillQuery('有没有用了投影技术的文献？')">投影技术</span>
      <span class="chip" onclick="fillQuery('2023年以后的多模态相关文献')">多模态</span>
      <span class="chip" onclick="fillQuery('有哪些文献研究了大语言模型的幻觉问题？')">幻觉问题</span>
    </div>
  </div>

  <div id="resultsArea"></div>
</div>
</div>

<script>
const mockDB = [
  {
    title: "Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks",
    authors: "Lewis P., Perez E., Piktus A. et al.",
    venue: "NeurIPS 2020", type: "conf",
    year: 2020,
    abstract: "通过将参数化记忆与非参数化记忆相结合，提出了一种用于知识密集型任务的检索增强生成框架，显著提升了开放域问答等任务的表现。",
    tags: ["RAG", "检索增强", "知识密集型任务", "语言模型"]
  },
  {
    title: "Dense Passage Retrieval for Open-Domain Question Answering",
    authors: "Karpukhin V., Oğuz B., Min S. et al.",
    venue: "EMNLP 2020", type: "conf",
    year: 2020,
    abstract: "提出 DPR 方法，使用双编码器架构学习密集向量表示，用于开放域问答中的段落检索，在多个基准上超越传统稀疏检索方法。",
    tags: ["密集检索", "DPR", "问答", "双编码器"]
  },
  {
    title: "REALM: Retrieval-Augmented Language Model Pre-Training",
    authors: "Guu K., Lee K., Tung Z. et al.",
    venue: "ICML 2020", type: "conf",
    year: 2020,
    abstract: "将知识检索模块融入语言模型预训练过程，令模型在预训练阶段即学会从外部语料中检索相关上下文，并用于填充掩码词。",
    tags: ["预训练", "检索增强", "语言模型", "知识检索"]
  },
  {
    title: "Large Language Models Can Be Easily Distracted by Irrelevant Context",
    authors: "Shi F., Chen X., Misra K. et al.",
    venue: "ICML 2023", type: "conf",
    year: 2023,
    abstract: "研究表明大型语言模型在面对包含不相关信息的上下文时容易产生注意力分散，导致推理错误，揭示了 LLM 在鲁棒性方面的重要挑战。",
    tags: ["LLM", "鲁棒性", "上下文干扰", "推理"]
  },
  {
    title: "Projected Residual Networks for Text Representation",
    authors: "Wang X., Li Y., Chen Z.",
    venue: "ACL 2022", type: "conf",
    year: 2022,
    abstract: "提出利用投影技术对文本残差表示进行降维和特征压缩，在文档分类和语义搜索任务中取得了更高效的表示性能。",
    tags: ["投影技术", "文本表示", "残差网络", "语义搜索"]
  }
];

function fillQuery(q) {
  const el = document.getElementById('queryInput');
  el.value = q;
  autoResize(el);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

document.getElementById('queryInput').addEventListener('input', function() {
  autoResize(this);
});

document.getElementById('queryInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runSearch(); }
});

function matchScore(paper, query) {
  const q = query.toLowerCase();
  let score = 0;
  if (q.includes('检索') && (paper.tags.some(t => t.includes('检索')) || paper.abstract.includes('检索'))) score += 3;
  if ((q.includes('rag') || q.includes('检索增强')) && paper.tags.some(t => t.includes('RAG') || t.includes('检索增强'))) score += 4;
  if (q.includes('投影') && (paper.tags.some(t => t.includes('投影')) || paper.abstract.includes('投影'))) score += 5;
  if (q.includes('多模态') && paper.tags.some(t => t.includes('多模态'))) score += 5;
  if (q.includes('幻觉') && paper.abstract.includes('鲁棒')) score += 3;
  if (q.includes('顶会') && paper.type === 'conf') score += 2;
  if (q.includes('2023') && paper.year === 2023) score += 3;
  if (paper.title.toLowerCase().includes(q.split(' ')[0])) score += 2;
  const keywords = ['检索', 'rag', '投影', '预训练', '幻觉', '问答', '表示', '语言模型'];
  keywords.forEach(k => {
    if (q.includes(k) && (paper.abstract.includes(k) || paper.tags.some(t => t.includes(k)))) score += 1;
  });
  if (score === 0) score = Math.random() * 0.5;
  return score;
}

function generateAnswer(query, papers) {
  if (!papers.length) return null;
  const q = query.toLowerCase();
  
  // 模拟后端返回的详细回答格式
  let answer = `根据你提供的查询，以下是一些相关的文献：\n\n`;
  
  papers.forEach((paper, index) => {
    answer += `${index + 1}. **${paper.authors}** - ${paper.title} (${paper.year})\n`;
    answer += `   发表于：${paper.venue}\n`;
    answer += `   摘要：${paper.abstract}\n`;
    answer += `   关键词：${paper.tags.join('、')}\n\n`;
  });
  
  answer += `这些研究涵盖了从理论框架到实际应用的广泛领域，包括但不限于 ${[...new Set(papers.flatMap(p => p.tags))].slice(0,3).join('、')} 等主题。\n`;
  answer += `希望这对您有所帮助！如果需要更详细的信息或特定领域的深入探讨，请告诉我。`;
  
  return answer;
}



//=====新增
async function runSearch() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const area = document.getElementById('resultsArea');
  // 显示加载动画
  area.innerHTML = `<div class="loading-row"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><span style="color:var(--color-text-tertiary);font-size:13px;"> 正在检索文献库...</span></div>`;

  try {
    const savedConfig = JSON.parse(localStorage.getItem('zoteroRagConfig') || '{}');
    const apiBaseUrl = (savedConfig.api?.url || 'http://127.0.0.1:8000').replace(/\/+$/, '');

    // 【关键】调用你本地 8000 端口的 FastAPI
    const response = await fetch(`${apiBaseUrl}/api/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, top_k: 4 })
    });

    const data = await response.json();

    if (data.success) {
      renderResults(data); // 调用下面的渲染函数
    } else {
      area.innerHTML = `<div class="empty">搜索失败：${data.error_message}</div>`;
    }
  } catch (error) {
    area.innerHTML = `<div class="empty">无法连接到后端服务器，请检查设置页中的后端地址，并确保服务已启动</div>`;
  }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 新增一个渲染函数，把后端返回的 JSON 变成漂亮的卡片
function renderResults(data) {
  const area = document.getElementById('resultsArea');
  let html = `<div class="answer-box"><div class="answer-label">AI 回答</div><div class="answer-content">${escapeHtml(data.answer)}</div></div>`;
  
  if (data.references && data.references.length > 0) {
    html += `<div class="results-header"><div class="results-count">找到 <strong>${data.references.length}</strong> 篇相关文献</div></div>`;
    data.references.forEach((p, i) => {
      const hits = Array.isArray(p.evidence_snippets) ? p.evidence_snippets : [];
      let evidenceHtml = '';
      if (hits.length > 0) {
        evidenceHtml = '<div class="card-evidence">';
        hits.forEach((h, j) => {
          const pg = h.page != null ? `第 ${h.page} 页` : '页码未知';
          evidenceHtml += `<div class="evidence-item"><div class="evidence-label">证据 ${j + 1} · ${escapeHtml(pg)}</div>${escapeHtml(h.content || '')}</div>`;
        });
        evidenceHtml += '</div>';
      } else if (p.abstract) {
        evidenceHtml = `<div class="card-abstract">${escapeHtml(p.abstract)}</div>`;
      }
      html += `
        <div class="card">
          <div class="card-top">
            <span class="card-index">${String(i+1).padStart(2,'0')}</span>
            <span class="card-title">${escapeHtml(p.title)}</span>
          </div>
          ${evidenceHtml}
        </div>`;
    });
  }
  area.innerHTML = html;
}

function mergeServerConfigToLocalStorage(data) {
  try {
    const raw = localStorage.getItem('zoteroRagConfig');
    const existing = raw ? JSON.parse(raw) : {};
    const merged = {
      rag: {
        zoteroPath: data.zotero_path || existing.rag?.zoteroPath || '',
        apiKey: '',
        baseUrl: data.base_url ?? existing.rag?.baseUrl ?? '',
        chatModel: data.chat_model || existing.rag?.chatModel || 'gpt-4o-mini',
        embeddingModel: data.embedding_model || existing.rag?.embeddingModel || 'text-embedding-3-small',
      },
      api: { url: existing.api?.url || 'http://127.0.0.1:8000' },
    };
    localStorage.setItem('zoteroRagConfig', JSON.stringify(merged));
  } catch (_) { /* ignore */ }
}

function renderResults(data) {
  const area = document.getElementById('resultsArea');
  const answerLabel = data.answer_type === 'direct_answer' ? 'AI 答案' : '检索结果';
  let html = `<div class="answer-box"><div class="answer-label">${escapeHtml(answerLabel)}</div><div class="answer-content">${escapeHtml(data.answer || '')}</div></div>`;

  if (Array.isArray(data.evidence_summary) && data.evidence_summary.length) {
    html += `<div class="card" style="cursor:default"><div class="card-title" style="margin-bottom:10px;">证据摘要</div><div class="card-evidence" style="padding-left:0">`;
    data.evidence_summary.forEach((item, idx) => {
      html += `<div class="evidence-item"><div class="evidence-label">摘要 ${idx + 1}</div>${escapeHtml(item)}</div>`;
    });
    html += `</div></div>`;
  }

  if (Array.isArray(data.references) && data.references.length) {
    html += `<div class="results-header"><div class="results-count">引用与相关文献 <strong>${data.references.length}</strong></div></div>`;
    data.references.forEach((ref, idx) => {
      const snippets = Array.isArray(ref.evidence_snippets) ? ref.evidence_snippets : [];
      html += `<div class="card">
        <div class="card-top">
          <div class="card-index">${String(idx + 1).padStart(2, '0')}</div>
          <div class="card-title">${escapeHtml(ref.title || '未知文献')}</div>
        </div>
        <div class="card-meta">
          ${ref.page ? `<span>第 ${ref.page} 页</span>` : ''}
          ${ref.year ? `<span>${escapeHtml(String(ref.year))}</span>` : ''}
          ${ref.venue ? `<span>${escapeHtml(ref.venue)}</span>` : ''}
        </div>`;
      if (ref.abstract) {
        html += `<div class="card-abstract">${escapeHtml(ref.abstract)}</div>`;
      }
      if (snippets.length) {
        html += `<div class="card-evidence">`;
        snippets.forEach((snippet, sidx) => {
          html += `<div class="evidence-item"><div class="evidence-label">证据 ${sidx + 1}${snippet.page ? ` · 第 ${snippet.page} 页` : ''}</div>${escapeHtml(snippet.content || '')}</div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
  }

  area.innerHTML = html;
}

async function checkConfigBeforeUse() {
  const notice = document.getElementById('configNotice');
  const apiBaseUrl = 'http://127.0.0.1:8000';

  try {
    const cfgRes = await fetch(`${apiBaseUrl}/api/config`);
    const data = await cfgRes.json();

    if (cfgRes.ok && data.success) {
      mergeServerConfigToLocalStorage(data);
    }

    const missingConfig = !cfgRes.ok || !data.success || !data.zotero_path || !data.api_key_set;

    if (missingConfig) {
      notice.style.display = 'block';
      notice.innerHTML = `首次使用请先完成配置（PDF 文件夹、API Key 等）。<a href="settings.html?returnTo=main">点击前往设置</a>`;
      return;
    }

    let healthRes = await fetch(`${apiBaseUrl}/health`);
    let health = await healthRes.json();

    if (!health.ready) {
      await fetch(`${apiBaseUrl}/api/init`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
      healthRes = await fetch(`${apiBaseUrl}/health`);
      health = await healthRes.json();
    }

    if (!health.ready) {
      notice.style.display = 'block';
      const err = health.init_error ? escapeHtml(health.init_error) : '引擎未能就绪';
      notice.innerHTML = `后端引擎未就绪：${err} <a href="settings.html?returnTo=main">检查设置</a>`;
      return;
    }

    notice.style.display = 'none';
  } catch (error) {
    notice.style.display = 'block';
    notice.innerHTML = `后端未启动，无法查询文献。请先启动服务，再到设置页检查配置。`;
  }
}


checkConfigBeforeUse();
</script>
