<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统配置 · Zotero RAG</title>
<style>
/* Element Plus 风格变量 */
:root {
  --el-color-primary: #409eff;
  --el-color-primary-light-3: #79bbff;
  --el-color-primary-light-9: #ecf5ff;
  
  --el-color-success: #67c23a;
  --el-color-success-light-9: #f0f9eb;
  --el-color-success-border: #e1f3d8;

  --el-color-danger: #f56c6c;
  --el-color-danger-light-9: #fef0f0;
  --el-color-danger-border: #fde2e2;

  --el-text-color-primary: #303133;
  --el-text-color-regular: #606266;
  --el-text-color-secondary: #909399;
  --el-text-color-placeholder: #a8abb2;

  --el-border-color: #dcdfe6;
  --el-border-color-light: #e4e7ed;
  --el-border-color-lighter: #ebeef5;
  --el-border-color-hover: #c0c4cc;

  --el-bg-color: #ffffff;
  --el-bg-color-page: #f5f7fa;

  --el-border-radius-base: 4px;
  --el-border-radius-round: 20px;
  
  --el-transition-duration: 0.2s;
  --el-font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
  --el-box-shadow-light: 0px 0px 12px rgba(0, 0, 0, 0.05);
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body {
  font-family: var(--el-font-family);
  background: var(--el-bg-color-page);
  color: var(--el-text-color-regular);
  min-height: 100vh;
  padding: 40px 20px;
  -webkit-font-smoothing: antialiased;
}

.page-wrap {
  max-width: 800px;
  margin: 0 auto;
}

/* 头部样式 */
.header {
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  font-size: 20px;
  font-weight: 500;
  color: var(--el-text-color-primary);
}

.header-actions {
  display: flex;
  gap: 12px;
}

/* 按钮样式 (el-button) */
.btn {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  line-height: 1;
  height: 32px;
  white-space: nowrap;
  cursor: pointer;
  text-align: center;
  box-sizing: border-box;
  outline: none;
  transition: var(--el-transition-duration);
  font-weight: 500;
  padding: 8px 15px;
  font-size: 14px;
  border-radius: var(--el-border-radius-base);
  font-family: var(--el-font-family);
}

.btn-primary {
  color: #fff;
  background-color: var(--el-color-primary);
  border: 1px solid var(--el-color-primary);
}

.btn-primary:hover {
  background-color: var(--el-color-primary-light-3);
  border-color: var(--el-color-primary-light-3);
}

.btn-primary:active {
  background-color: #3a8ee6;
  border-color: #3a8ee6;
}

.btn-secondary {
  color: var(--el-text-color-regular);
  background-color: var(--el-bg-color);
  border: 1px solid var(--el-border-color);
}

.btn-secondary:hover {
  color: var(--el-color-primary);
  border-color: var(--el-color-primary-light-3);
  background-color: var(--el-color-primary-light-9);
}

.btn-secondary:active {
  border-color: var(--el-color-primary);
}

/* 卡片样式 (el-card) */
.config-section {
  background: var(--el-bg-color);
  border: 1px solid var(--el-border-color-light);
  border-radius: var(--el-border-radius-base);
  box-shadow: var(--el-box-shadow-light);
  padding: 24px;
  margin-bottom: 20px;
  transition: .3s;
}

.section-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--el-text-color-primary);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--el-border-color-lighter);
}

/* 表单样式 (el-form) */
.form-group {
  margin-bottom: 22px;
}

.form-group:last-child {
  margin-bottom: 0;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--el-text-color-regular);
  margin-bottom: 8px;
  line-height: 1.4;
}

/* 输入框样式 (el-input) */
.form-input {
  -webkit-appearance: none;
  background-color: var(--el-bg-color);
  background-image: none;
  border-radius: var(--el-border-radius-base);
  border: 1px solid var(--el-border-color);
  box-sizing: border-box;
  color: var(--el-text-color-regular);
  display: inline-block;
  font-size: 14px;
  height: 32px;
  line-height: 32px;
  outline: none;
  padding: 0 11px;
  transition: border-color var(--el-transition-duration) cubic-bezier(.645,.045,.355,1);
  width: 100%;
  font-family: var(--el-font-family);
}

.form-input:hover {
  border-color: var(--el-border-color-hover);
}

.form-input:focus {
  border-color: var(--el-color-primary);
}

.form-input::placeholder {
  color: var(--el-text-color-placeholder);
}

.form-help {
  font-size: 12px;
  color: var(--el-text-color-secondary);
  margin-top: 6px;
  line-height: 1.5;
}

.form-row {
  display: flex;
  gap: 20px;
}

.form-row .form-group {
  flex: 1;
  margin-bottom: 0; /* Row 中的底部边距由外部控制，这里去掉 */
}

/* 标签样式 (el-tag) */
.status-badge {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  height: 24px;
  padding: 0 9px;
  font-size: 12px;
  line-height: 22px;
  border-radius: var(--el-border-radius-base);
  border: 1px solid transparent;
  margin-left: 10px;
  white-space: nowrap;
}

.status-connected {
  background-color: var(--el-color-success-light-9);
  border-color: var(--el-color-success-border);
  color: var(--el-color-success);
}

.status-disconnected {
  background-color: var(--el-color-danger-light-9);
  border-color: var(--el-color-danger-border);
  color: var(--el-color-danger);
}

/* 内部测试按钮微调 */
.test-btn {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  line-height: 1;
  height: 24px;
  padding: 0 11px;
  font-size: 12px;
  background-color: var(--el-bg-color);
  border: 1px solid var(--el-border-color);
  color: var(--el-text-color-regular);
  border-radius: var(--el-border-radius-base);
  cursor: pointer;
  margin-left: 12px;
  transition: var(--el-transition-duration);
}

.test-btn:hover {
  color: var(--el-color-primary);
  border-color: var(--el-color-primary-light-3);
  background-color: var(--el-color-primary-light-9);
}

/* 响应式处理 */
@media (max-width: 600px) {
  .form-row {
    flex-direction: column;
    gap: 22px;
  }
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div class="header-title">系统配置</div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="goToMainPage()">返回</button>
      <button class="btn btn-secondary" onclick="resetConfig()">重置</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

  <div class="config-section">
    <div class="section-title">RAG 引擎配置</div>

    <div class="form-group">
      <label class="form-label">PDF 文件夹地址（zotero_path）</label>
      <input type="text" class="form-input" id="ragZoteroPath" placeholder="D:/Download/pdfs">
      <div class="form-help">本地 PDF 文件夹路径，将写入后端 config.yaml 的 zotero_path</div>
    </div>

    <div class="form-group">
      <label class="form-label">模型 API Key</label>
      <input type="password" class="form-input" id="ragApiKey" placeholder="sk-xxxxxxxxxxxx" autocomplete="new-password">
      <div class="form-help">仅在填写时才会更新后端 API Key；留空表示不改动当前 Key</div>
    </div>

    <div class="form-group">
      <label class="form-label">模型 Base URL</label>
      <input type="text" class="form-input" id="ragBaseUrl" placeholder="https://api.openai.com/v1">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">聊天模型（chat_model）</label>
        <input type="text" class="form-input" id="ragChatModel" placeholder="gpt-4o-mini">
      </div>
      <div class="form-group">
        <label class="form-label">向量模型（embedding_model）</label>
        <input type="text" class="form-input" id="ragEmbeddingModel" placeholder="text-embedding-3-small">
      </div>
    </div>
  </div>

  <div class="config-section">
    <div class="section-title">连接测试</div>
    
    <div class="form-group">
      <label class="form-label">API 连接状态</label>
      <div style="display: flex; align-items: center;">
        <span class="status-badge status-disconnected" id="apiStatus">未连接</span>
        <button class="test-btn" onclick="testApiConnection()">测试连接</button>
      </div>
    </div>
  </div>

  <div class="config-section">
    <div class="section-title">索引管理</div>
    <div class="form-group">
      <label class="form-label">全库索引重建</label>
      <div style="display: flex; align-items: center; gap: 15px;">
        <button class="btn btn-secondary" id="rebuildBtn" onclick="handleRebuild()">重建全库索引</button>
        <span id="rebuildStatusText" style="font-size: 14px; color: var(--el-text-color-secondary);">状态：空闲</span>
      </div>

      <div id="progressContainer" style="display: none; margin-top: 15px;">
         <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px;">
             <span id="progressMessage" style="color: var(--el-text-color-regular);">准备中...</span>
             <span id="progressPercent" style="font-weight: 500; color: var(--el-color-primary);">0%</span>
         </div>
         <div style="width: 100%; height: 8px; background-color: var(--el-border-color-lighter); border-radius: 4px; overflow: hidden;">
             <div id="progressBar" style="width: 0%; height: 100%; background-color: var(--el-color-primary); transition: width 0.3s ease;"></div>
         </div>
      </div>

      <div class="form-help" style="margin-top: 12px;">重建将删除旧索引，重新扫描 PDF 并生成向量。文件较多时可能需要数分钟。</div>
      <div id="rebuildErrorMsg" style="color: var(--el-color-danger); font-size: 12px; margin-top: 8px; display: none;"></div>
    </div>
</div>


</div>

<script>
async function saveConfig() {
  const config = {
    rag: {
      zoteroPath: document.getElementById('ragZoteroPath').value,
      apiKey: document.getElementById('ragApiKey').value,
      baseUrl: document.getElementById('ragBaseUrl').value,
      chatModel: document.getElementById('ragChatModel').value,
      embeddingModel: document.getElementById('ragEmbeddingModel').value
    },
    api: {
      url: 'http://127.0.0.1:8000'
    }
  };

  const forLocal = JSON.parse(JSON.stringify(config));
  forLocal.rag.apiKey = '';
  localStorage.setItem('zoteroRagConfig', JSON.stringify(forLocal));

  const apiUrl = 'http://127.0.0.1:8000';
  try {
    const response = await fetch(`${apiUrl}/api/config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        zotero_path: config.rag.zoteroPath,
        api_key: config.rag.apiKey,
        base_url: config.rag.baseUrl || null,
        chat_model: config.rag.chatModel,
        embedding_model: config.rag.embeddingModel
      })
    });

    const data = await response.json();
    if (!response.ok || !data.success) {
      throw new Error(data.message || '后端保存失败');
    }
    alert('配置已保存，并已同步到后端 config.yaml');
    document.getElementById('ragApiKey').value = '';
    const params = new URLSearchParams(window.location.search);
    if (params.get('returnTo') === 'main') {
      window.location.href = '/';
    }
  } catch (error) {
    alert(`本地已保存，但后端写入失败：${error.message}`);
  }
}

function loadConfig() {
  const savedConfig = localStorage.getItem('zoteroRagConfig');
  if (savedConfig) {
    const config = JSON.parse(savedConfig);
    if (config.rag && 'apiKey' in config.rag) {
      delete config.rag.apiKey;
      localStorage.setItem('zoteroRagConfig', JSON.stringify(config));
    }

    document.getElementById('ragZoteroPath').value = config.rag?.zoteroPath || '';
    document.getElementById('ragApiKey').value = '';
    document.getElementById('ragBaseUrl').value = config.rag?.baseUrl || '';
    document.getElementById('ragChatModel').value = config.rag?.chatModel || 'gpt-4o-mini';
    document.getElementById('ragEmbeddingModel').value = config.rag?.embeddingModel || 'text-embedding-3-small';
    
  }
}

async function loadServerConfig() {
  const apiUrl = 'http://127.0.0.1:8000';
  try {
    const response = await fetch(`${apiUrl}/api/config`);
    const data = await response.json();
    if (!response.ok || !data.success) return;

    document.getElementById('ragZoteroPath').value = data.zotero_path || '';
    document.getElementById('ragBaseUrl').value = data.base_url || '';
    document.getElementById('ragChatModel').value = data.chat_model || 'gpt-4o-mini';
    document.getElementById('ragEmbeddingModel').value = data.embedding_model || 'text-embedding-3-small';

    // 与服务器对齐后写回 localStorage，主页面与其它标签页能沿用同一份表单缓存
    try {
      const raw = localStorage.getItem('zoteroRagConfig');
      const existing = raw ? JSON.parse(raw) : {};
      const merged = {
        rag: {
          zoteroPath: document.getElementById('ragZoteroPath').value,
          apiKey: '',
          baseUrl: document.getElementById('ragBaseUrl').value,
          chatModel: document.getElementById('ragChatModel').value,
          embeddingModel: document.getElementById('ragEmbeddingModel').value,
        },
        api: { url: existing.api?.url || 'http://127.0.0.1:8000' },
      };
      localStorage.setItem('zoteroRagConfig', JSON.stringify(merged));
    } catch (_) { /* ignore */ }
  } catch (error) {
    // 后端未启动时静默失败，避免影响页面使用
  }
}

function resetConfig() {
  if (confirm('确定要重置所有配置吗？')) {
    localStorage.removeItem('zoteroRagConfig');
    location.reload();
  }
}

function goToMainPage() {
  window.location.href = '/';
}

function testApiConnection() {
  const apiUrl = 'http://127.0.0.1:8000';
  const statusBadge = document.getElementById('apiStatus');
  
  statusBadge.textContent = '测试中...';
  statusBadge.className = 'status-badge';
  
  fetch(`${apiUrl}/health`, { method: 'GET' })
    .then(response => {
      if (response.ok) {
        statusBadge.textContent = '已连接';
        statusBadge.className = 'status-badge status-connected';
      } else {
        throw new Error('连接失败');
      }
    })
    .catch(error => {
      statusBadge.textContent = '连接失败';
      statusBadge.className = 'status-badge status-disconnected';
    });
}

loadConfig();
loadServerConfig();
</script>

<script>
  // yzx 在“连接测试”卡片下方新增一个“索引管理”区域，并实现轮询逻辑
  
  let rebuildPollingTimer = null;
  
  async function handleRebuild() {
    if (!confirm('确定要重建全库索引吗？这会删除当前已有的向量数据并重新生成。')) return;
  
    const apiUrl = 'http://127.0.0.1:8000';
    const btn = document.getElementById('rebuildBtn');
    const statusText = document.getElementById('rebuildStatusText');
    const errorDiv = document.getElementById('rebuildErrorMsg');
  
    try {
      btn.disabled = true;
      errorDiv.style.display = 'none';
      
      const response = await fetch(`${apiUrl}/api/rebuild`, { method: 'POST' });
      const data = await response.json();
  
      if (data.success) {
        startPollingRebuildStatus();
      } else {
        alert(data.message);
        btn.disabled = false;
      }
    } catch (e) {
      alert('请求失败：' + e.message);
      btn.disabled = false;
    }
  }
  
  function startPollingRebuildStatus() {
  const statusText = document.getElementById('rebuildStatusText');
  const btn = document.getElementById('rebuildBtn');
  const errorDiv = document.getElementById('rebuildErrorMsg');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const progressMessage = document.getElementById('progressMessage');
  const progressPercent = document.getElementById('progressPercent');
  const apiUrl = 'http://127.0.0.1:8000';

  if (rebuildPollingTimer) clearInterval(rebuildPollingTimer);

  rebuildPollingTimer = setInterval(async () => {
    try {
      const res = await fetch(`${apiUrl}/api/rebuild/status`);
      const data = await res.json();

      if (data.status === 'processing') {
        statusText.textContent = '状态：正在重建中...';
        statusText.style.color = 'var(--el-color-primary)';
        btn.disabled = true;
        progressContainer.style.display = 'block'; // 显示进度条

        // 更新进度条 UI
        if (data.progress) {
            const percent = data.progress.percent || 0;
            progressBar.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
            progressMessage.textContent = data.progress.message || '处理中...';

            // 如果遇到长文件名，可以加个 title 悬浮显示完整信息
            progressMessage.title = data.progress.message || '';
        }

      } else if (data.status === 'success') {
        statusText.textContent = '状态：重建成功 ✅';
        statusText.style.color = 'var(--el-color-success)';
        btn.disabled = false;
        clearInterval(rebuildPollingTimer);

        // 进度条拉满
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        progressMessage.textContent = '全部完成！';

        setTimeout(() => { alert('索引重建已完成！'); }, 500);

      } else if (data.status === 'failed') {
        statusText.textContent = '状态：重建失败 ❌';
        statusText.style.color = 'var(--el-color-danger)';
        errorDiv.textContent = '错误详情：' + data.error;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        clearInterval(rebuildPollingTimer);
        progressMessage.textContent = '重建终止';
        progressBar.style.backgroundColor = 'var(--el-color-danger)'; // 变红
      }
    } catch (e) {
      console.error('轮询失败', e);
    }
  }, 1000); // 可以稍微加快轮询频率，比如 1 秒一次，让进度看起来更流畅
}
</script>

</body>
</html>
