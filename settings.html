<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统配置 · Zotero RAG</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-background-tertiary: #eeede8;
  --color-background-success: #e7f4da;
  --color-background-danger: #fde8e8;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #5f5e5a;
  --color-text-tertiary: #888780;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.page-wrap {
  max-width: 800px;
  margin: 0 auto;
}

.header {
  margin-bottom: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  font-size: 28px;
  font-weight: 500;
  color: var(--color-text-primary);
}

.header-actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--border-radius-md);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: opacity 0.15s;
}

.btn-primary {
  background: var(--color-text-primary);
  color: var(--color-background-primary);
}

.btn-secondary {
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-tertiary);
}

.btn:hover { opacity: 0.75; }
.btn:active { opacity: 0.55; transform: scale(0.98); }

.config-section {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.section-title {
  font-size: 18px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 1.5rem;
  padding-bottom: 0.75rem;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-bottom: 0.5rem;
}

.form-input {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font-sans);
  color: var(--color-text-primary);
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus {
  border-color: var(--color-border-secondary);
}

.form-input::placeholder {
  color: var(--color-text-tertiary);
}

.form-help {
  font-size: 12px;
  color: var(--color-text-tertiary);
  margin-top: 0.5rem;
}

.form-row {
  display: flex;
  gap: 15px;
}

.form-row .form-group {
  flex: 1;
}

.toggle-group {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}

.toggle-label {
  font-size: 14px;
  color: var(--color-text-primary);
}

.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.toggle-switch.active {
  background: var(--color-text-primary);
}

.toggle-switch::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  background: var(--color-background-primary);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.15s;
}

.toggle-switch.active::after {
  transform: translateX(20px);
}

.status-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  margin-left: 10px;
}

.status-connected {
  background: var(--color-background-success);
  color: #27500a;
}

.status-disconnected {
  background: var(--color-background-danger);
  color: #791f1f;
}

.test-btn {
  padding: 6px 12px;
  font-size: 12px;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  cursor: pointer;
  margin-left: 10px;
}

.test-btn:hover {
  background: var(--color-background-tertiary);
}

@media (max-width: 600px) {
  .form-row {
    flex-direction: column;
    gap: 0;
  }
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div class="header-title">系统配置</div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="goToMainPage()">返回</button>
      <button class="btn btn-secondary" onclick="resetConfig()">重置</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

  <div class="config-section">
    <div class="section-title">RAG 引擎配置</div>

    <div class="form-group">
      <label class="form-label">PDF 文件夹地址（zotero_path）</label>
      <input type="text" class="form-input" id="ragZoteroPath" placeholder="D:/Download/pdfs">
      <div class="form-help">本地 PDF 文件夹路径，将写入后端 config.yaml 的 zotero_path</div>
    </div>

    <div class="form-group">
      <label class="form-label">模型 API Key</label>
      <input type="password" class="form-input" id="ragApiKey" placeholder="sk-xxxxxxxxxxxx" autocomplete="new-password">
      <div class="form-help">仅在填写时才会更新后端 API Key；留空表示不改动当前 Key</div>
    </div>

    <div class="form-group">
      <label class="form-label">模型 Base URL</label>
      <input type="text" class="form-input" id="ragBaseUrl" placeholder="https://api.openai.com/v1">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">聊天模型（chat_model）</label>
        <input type="text" class="form-input" id="ragChatModel" placeholder="gpt-4o-mini">
      </div>
      <div class="form-group">
        <label class="form-label">向量模型（embedding_model）</label>
        <input type="text" class="form-input" id="ragEmbeddingModel" placeholder="text-embedding-3-small">
      </div>
    </div>
  </div>

  <div class="config-section">
    <div class="section-title">连接测试</div>
    
    <div class="form-group">
      <label class="form-label">API 连接状态</label>
      <div style="display: flex; align-items: center;">
        <span class="status-badge status-disconnected" id="apiStatus">未连接</span>
        <button class="test-btn" onclick="testApiConnection()">测试连接</button>
      </div>
    </div>

  </div>
</div>

<script>
async function saveConfig() {
  const config = {
    rag: {
      zoteroPath: document.getElementById('ragZoteroPath').value,
      apiKey: document.getElementById('ragApiKey').value,
      baseUrl: document.getElementById('ragBaseUrl').value,
      chatModel: document.getElementById('ragChatModel').value,
      embeddingModel: document.getElementById('ragEmbeddingModel').value
    },
    api: {
      url: 'http://127.0.0.1:8000'
    }
  };

  const forLocal = JSON.parse(JSON.stringify(config));
  forLocal.rag.apiKey = '';
  localStorage.setItem('zoteroRagConfig', JSON.stringify(forLocal));

  const apiUrl = 'http://127.0.0.1:8000';
  try {
    const response = await fetch(`${apiUrl}/api/config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        zotero_path: config.rag.zoteroPath,
        api_key: config.rag.apiKey,
        base_url: config.rag.baseUrl || null,
        chat_model: config.rag.chatModel,
        embedding_model: config.rag.embeddingModel
      })
    });

    const data = await response.json();
    if (!response.ok || !data.success) {
      throw new Error(data.message || '后端保存失败');
    }
    alert('配置已保存，并已同步到后端 config.yaml');
    document.getElementById('ragApiKey').value = '';
    const params = new URLSearchParams(window.location.search);
    if (params.get('returnTo') === 'main') {
      window.location.href = '/';
    }
  } catch (error) {
    alert(`本地已保存，但后端写入失败：${error.message}`);
  }
}

function loadConfig() {
  const savedConfig = localStorage.getItem('zoteroRagConfig');
  if (savedConfig) {
    const config = JSON.parse(savedConfig);
    if (config.rag && 'apiKey' in config.rag) {
      delete config.rag.apiKey;
      localStorage.setItem('zoteroRagConfig', JSON.stringify(config));
    }

    document.getElementById('ragZoteroPath').value = config.rag?.zoteroPath || '';
    document.getElementById('ragApiKey').value = '';
    document.getElementById('ragBaseUrl').value = config.rag?.baseUrl || '';
    document.getElementById('ragChatModel').value = config.rag?.chatModel || 'gpt-4o-mini';
    document.getElementById('ragEmbeddingModel').value = config.rag?.embeddingModel || 'text-embedding-3-small';
    
  }
}

async function loadServerConfig() {
  const apiUrl = 'http://127.0.0.1:8000';
  try {
    const response = await fetch(`${apiUrl}/api/config`);
    const data = await response.json();
    if (!response.ok || !data.success) return;

    document.getElementById('ragZoteroPath').value = data.zotero_path || '';
    document.getElementById('ragBaseUrl').value = data.base_url || '';
    document.getElementById('ragChatModel').value = data.chat_model || 'gpt-4o-mini';
    document.getElementById('ragEmbeddingModel').value = data.embedding_model || 'text-embedding-3-small';

    // 与服务器对齐后写回 localStorage，主页面与其它标签页能沿用同一份表单缓存
    try {
      const raw = localStorage.getItem('zoteroRagConfig');
      const existing = raw ? JSON.parse(raw) : {};
      const merged = {
        rag: {
          zoteroPath: document.getElementById('ragZoteroPath').value,
          apiKey: '',
          baseUrl: document.getElementById('ragBaseUrl').value,
          chatModel: document.getElementById('ragChatModel').value,
          embeddingModel: document.getElementById('ragEmbeddingModel').value,
        },
        api: { url: existing.api?.url || 'http://127.0.0.1:8000' },
      };
      localStorage.setItem('zoteroRagConfig', JSON.stringify(merged));
    } catch (_) { /* ignore */ }
  } catch (error) {
    // 后端未启动时静默失败，避免影响页面使用
  }
}

function resetConfig() {
  if (confirm('确定要重置所有配置吗？')) {
    localStorage.removeItem('zoteroRagConfig');
    location.reload();
  }
}

function goToMainPage() {
  window.location.href = '/';
}

function testApiConnection() {
  const apiUrl = 'http://127.0.0.1:8000';
  const statusBadge = document.getElementById('apiStatus');
  
  statusBadge.textContent = '测试中...';
  statusBadge.className = 'status-badge';
  
  fetch(`${apiUrl}/health`, { method: 'GET' })
    .then(response => {
      if (response.ok) {
        statusBadge.textContent = '已连接';
        statusBadge.className = 'status-badge status-connected';
      } else {
        throw new Error('连接失败');
      }
    })
    .catch(error => {
      statusBadge.textContent = '连接失败';
      statusBadge.className = 'status-badge status-disconnected';
    });
}

loadConfig();
loadServerConfig();
</script>
</body>
</html>
